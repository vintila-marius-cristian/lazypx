name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o lazypx .

  test:
    name: Test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        id: tests
        run: go test -race -count=1 -timeout 5m -coverprofile=coverage.out ./... 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Display test results
        if: always()
        run: cat test-output.txt | tail -40

      - name: Display coverage
        if: always()
        run: go tool cover -func=coverage.out 2>/dev/null | tail -15

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            test-output.txt
          retention-days: 7
